server {
    listen 80;
    listen [::]:80;
    server_name builder.poppcic.cn;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name builder.poppcic.cn;

    root /opt/builderos/current/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/builder.poppcic.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/builder.poppcic.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://127.0.0.1:4188;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 20m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
